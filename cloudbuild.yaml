steps:
  # Build Docker image with Vite env vars injected as build args
  - name: 'gcr.io/cloud-builders/docker'
    env:
      - 'DOCKER_BUILDKIT=1'
    args:
      - 'build'
      - '--build-arg'
      - 'VITE_SUPABASE_URL=$_SUPABASE_URL'
      - '--build-arg'
      - 'VITE_SUPABASE_ANON_KEY=$_SUPABASE_ANON_KEY'
      - '--build-arg'
      - 'VITE_VAPID_PUBLIC_KEY=$_VAPID_PUBLIC_KEY'
      - '-t'
      - 'gcr.io/$PROJECT_ID/taskpoint:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/taskpoint:latest'
      - '.'

  # Push both tags individually (--all-tags requires Docker 20.10+)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/taskpoint:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/taskpoint:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'taskpoint'
      - '--image'
      - 'gcr.io/$PROJECT_ID/taskpoint:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'

substitutions:
  _SUPABASE_URL: ''       # Set in Cloud Build trigger settings
  _SUPABASE_ANON_KEY: ''  # Set in Cloud Build trigger settings
  _VAPID_PUBLIC_KEY: ''   # Set in Cloud Build trigger settings

images:
  - 'gcr.io/$PROJECT_ID/taskpoint:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/taskpoint:latest'

options:
  logging: CLOUD_LOGGING_ONLY
