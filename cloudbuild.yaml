steps:
  # Create Artifact Registry repo if it doesn't exist
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        gcloud artifacts repositories describe cloud-run-source-deploy \
          --location=${_REGION} --format="value(name)" 2>/dev/null || \
        gcloud artifacts repositories create cloud-run-source-deploy \
          --repository-format=docker \
          --location=${_REGION} \
          --description="Cloud Run deployments"

  # Build Docker image with Vite env vars injected as build args
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'VITE_SUPABASE_URL=${_SUPABASE_URL}'
      - '--build-arg'
      - 'VITE_SUPABASE_ANON_KEY=${_SUPABASE_ANON_KEY}'
      - '--build-arg'
      - 'VITE_VAPID_PUBLIC_KEY=${_VAPID_PUBLIC_KEY}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/taskpoint:$SHORT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/taskpoint:latest'
      - '.'

  # Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/taskpoint'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'mervs--1--git'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/taskpoint:$SHORT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'

substitutions:
  _SUPABASE_URL: ''       # Set in Cloud Build trigger settings
  _SUPABASE_ANON_KEY: ''  # Set in Cloud Build trigger settings
  _VAPID_PUBLIC_KEY: ''   # Set in Cloud Build trigger settings
  _REGION: 'us-east5'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/taskpoint:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/taskpoint:latest'

options:
  logging: CLOUD_LOGGING_ONLY
